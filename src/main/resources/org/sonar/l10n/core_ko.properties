dependencies.risks.severity.help.warning_msg=이 위험의 심각도가 {manualSeverity}(으)로 수동 변경되었지만, 새 데이터에 따르면 계산된 심각도가 {originalSeverity}(으)로 증가했습니다. {manualSeverity}(으)로의 이전 재정의가 여전히 적절한지 확인하기 위해 위험을 검토하는 것을 권장합니다. 이 위험의 심각도 변경 이력을 보려면 <link>활동 탭</link>을 확인하세요.
