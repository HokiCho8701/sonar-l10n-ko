component_measures.domain_subnavigation.Reliability.help=이 도메인의 이슈는 예상과 다른 동작을 하는 코드를 표시합니다.
component_measures.domain_subnavigation.Maintainability.help=이 도메인의 이슈는 적절하게 업데이트하기 어려운 코드를 표시합니다.
component_measures.domain_subnavigation.Security.help=이 도메인의 이슈는 해커에 대한 잠재적 취약점을 표시합니다.
component_measures.domain_subnavigation.SecurityReview.help=이 도메인은 핫스팟과 검토 상태 형태로 잠재적인 보안 위험을 나타냅니다.
component_measures.domain_subnavigation.Complexity.help=애플리케이션의 제어 흐름이 얼마나 단순하거나 복잡한지를 나타냅니다. 순환 복잡도는 완전한 테스트 커버리지에 필요한 최소 테스트 케이스 수를 측정합니다. 인지 복잡도는 애플리케이션을 이해하기 어려운 정도를 측정하는 지표입니다.
