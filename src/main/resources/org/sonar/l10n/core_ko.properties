issue.clean_code_attribute.CLEAR.advice=명확하기 위해서는 코드가 자기 설명적이고 기능을 투명하게 전달해야 합니다.
issue.clean_code_attribute.COMPLETE=완전하지 않음
issue.clean_code_attribute.COMPLETE.title=이것은 의도성 이슈로, 코드가 충분히 완전하지 않습니다.
issue.clean_code_attribute.COMPLETE.advice=완전하기 위해서는 코드가 기능적이어야 하고 포괄적이고 적절하며 철저한 코드 구조를 통해 암시된 목표를 달성해야 합니다.
issue.clean_code_attribute.CONVENTIONAL=관례적이지 않음
