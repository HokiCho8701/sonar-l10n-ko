dependencies.risks.severity.help.vulnerability.body=취약점에는 취약점 심각도(CVSS에서 정의), 알려진 악용(CISA KEV에서 정의), 향후 악용 가능성(EPSS에서 정의)을 기반으로 종합 심각도 등급이 부여됩니다.
dependencies.risks.severity.help.manual_update=이 위험의 심각도가 {severity}(으)로 수동 변경되었습니다. 이 위험의 심각도 변경 이력을 보려면 <link>활동 탭</link>을 확인하세요.
