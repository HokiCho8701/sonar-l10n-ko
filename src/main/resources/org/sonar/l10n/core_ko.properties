sca.licenses.set_category_modal.body=Sonar는 정책 설정을 더 쉽게 하기 위해 특성에 따라 많은 일반적인 오픈소스 라이선스를 분류했습니다. 범주별로 기본 정책을 설정하면 해당 범주의 모든 라이선스를 빠르게 허용하거나 금지할 수 있습니다. 필요에 따라 언제든지 개별 라이선스에 대한 정책을 설정할 수 있으니 걱정하지 마세요.
