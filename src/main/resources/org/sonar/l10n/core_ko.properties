issue.clean_code_attribute.CONVENTIONAL.advice=관례적이기 위해서는 코드가 예상되는 지침으로 작업을 수행하고, 동등하게 좋은 선택지가 있을 때 모든 경우에서 단일 선택을 고수해야 합니다.
issue.clean_code_attribute.DISTINCT=뚜렷하지 않음
issue.clean_code_attribute.DISTINCT.title=이것은 적응성 이슈로, 코드가 충분히 뚜렷하지 않습니다.
issue.clean_code_attribute.DISTINCT.advice=뚜렷하기 위해서는 코드의 절차와 데이터가 고유하고 특징적이어야 하며 불필요한 중복이 없어야 합니다.
issue.clean_code_attribute.EFFICIENT=효율적이지 않음
issue.clean_code_attribute.EFFICIENT.title=이것은 의도성 이슈로, 코드가 충분히 효율적이지 않습니다.
issue.clean_code_attribute.EFFICIENT.advice=효율적이기 위해서는 코드가 불필요한 낭비 없이 리소스를 사용하고 가능한 경우 경제적인 옵션을 우선시해야 합니다.
issue.clean_code_attribute.FOCUSED=집중되지 않음
issue.clean_code_attribute.FOCUSED.title=이것은 적응성 이슈로, 코드가 충분히 집중되지 않았습니다.
issue.clean_code_attribute.FOCUSED.advice=집중되기 위해서는 코드가 단일하고 좁으며 특정 범위를 가져야 합니다. 각 단위는 하나의 간결한 목적만 가져야 합니다.
issue.clean_code_attribute.FORMATTED=형식화되지 않음
