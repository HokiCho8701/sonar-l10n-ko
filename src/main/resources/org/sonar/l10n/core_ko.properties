issue.clean_code_attribute.FORMATTED.advice=형식화되기 위해서는 코드가 체계적이고 규칙적인 방식으로 제시되고, 전체 코드베이스에서 동일한 비의미론적 선택이 사용되어야 합니다.
issue.clean_code_attribute.IDENTIFIABLE=식별 가능하지 않음
issue.clean_code_attribute.IDENTIFIABLE.title=이것은 일관성 이슈로, 코드의 식별성이 충분하지 않습니다.
issue.clean_code_attribute.IDENTIFIABLE.advice=식별 가능하기 위해서는 코드에 언어 관례에 기반한 규칙적인 구조의 이름과 식별자가 포함되어야 합니다.
issue.clean_code_attribute.LAWFUL=합법적이지 않음
issue.clean_code_attribute.LAWFUL.title=이것은 책임성 이슈로, 코드의 합법성이 충분하지 않습니다.
issue.clean_code_attribute.LAWFUL.advice=합법적이기 위해서는 코드가 라이선스 및 저작권 규정을 준수해야 합니다.
issue.clean_code_attribute.LOGICAL=논리적이지 않음
issue.clean_code_attribute.LOGICAL.title=이것은 의도성 이슈로, 코드의 논리성이 충분하지 않습니다.
issue.clean_code_attribute.LOGICAL.advice=논리적이기 위해서는 코드에 잘 구성되고 상호 작용하는 올바른 명령이 포함되어야 하며 명시적인 오류가 없어야 합니다.
issue.clean_code_attribute.MODULAR=모듈화되지 않음
issue.clean_code_attribute.MODULAR.title=이것은 적응성 이슈로, 코드의 모듈화가 충분하지 않습니다.
issue.clean_code_attribute.MODULAR.advice=모듈화되기 위해서는 코드가 부분 간의 분리를 강조하도록 정리되고 분산되어야 합니다.
issue.clean_code_attribute.RESPECTFUL=존중하지 않음
issue.clean_code_attribute.RESPECTFUL.title=이것은 책임성 이슈로, 코드의 존중성이 충분하지 않습니다.
issue.clean_code_attribute.RESPECTFUL.advice=존중하기 위해서는 코드가 차별적이고 공격적인 언어 사용을 자제해야 합니다.
issue.clean_code_attribute.TESTED=테스트되지 않음
issue.clean_code_attribute.TESTED.title=이것은 적응성 이슈로, 코드가 충분히 테스트되지 않았습니다.
issue.clean_code_attribute.TESTED.advice=테스트되기 위해서는 기능에 대한 신뢰성을 제공하는 자동화된 기능 테스트가 필요합니다.
issue.clean_code_attribute.TRUSTWORTHY=신뢰할 수 없음
