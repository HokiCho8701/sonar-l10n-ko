settings.design_and_architecture.header=설계 및 아키텍처
settings.design_and_architecture.description.1=이 무료 체험판은 Sonar의 재량으로 제공되며 향후 중단될 수 있습니다. 체험 기간 종료 후 설계 및 아키텍처는 유료 기능이 됩니다. 체험 기간 동안 이 기능을 사용해도 조직에 비용이 발생하지 않습니다.
settings.design_and_architecture.description.2=이 옵션을 활성화하면 조직의 모든 사용자가 SonarQube에서 직접 코드베이스를 시각화할 수 있습니다.
settings.design_and_architecture.description.3=이 옵션을 활성화하면 <link>얼리 액세스 이용 약관</link>에 동의하는 것으로 간주됩니다.
