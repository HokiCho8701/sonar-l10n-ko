dependencies.risk.how.no_guidance=Sonar에서 이 취약점에 대한 해결 지침을 아직 제공하지 않습니다. 업데이트 가능한 영향받지 않는 릴리스가 있는지 수동으로 확인해야 합니다. 영향받는 버전에 대한 지침은 "위험이 무엇인가" 정보를 확인하세요.
sca.licenses.page=라이선스 프로파일
sca.licenses.page.intro=라이선스 프로파일은 프로젝트에서 사용하는 의존성에 대해 허용되거나 금지된 라이선스를 정의하는 정책의 모음입니다. 분석 중에 금지된 라이선스를 가진 의존성이 발견되면 의존성 위험으로 식별됩니다. 자세한 내용은 {docsLink} 문서를 참조하세요.
sca.licenses.page.no_profiles.title=라이선스 프로파일이 생성될 때까지 의존성 라이선스는 분석되지 않습니다.
sca.licenses.page.no_profiles.body=프로젝트 라이선스를 분석하려면 라이선스 프로파일이 할당되어야 합니다. 분석할 프로젝트를 수동으로 선택하거나 모든 프로젝트에 대한 기본 프로파일을 설정할 수 있습니다.
sca.licenses.create_profile=프로파일 생성
sca.licenses.details_page.intro=라이선스 프로파일은 프로젝트에서 사용하는 의존성에 대해 허용되거나 금지된 라이선스를 정의하는 정책을 설정하는 데 사용됩니다. 분석 중에 금지된 라이선스를 가진 의존성이 발견되면 의존성 위험으로 식별됩니다.
sca.licenses.license_override_applied={licenseCategory} 라이선스의 기본 정책은 <b>{defaultPolicy}</b>입니다. 기본 정책을 <b>{policy}</b>(으)로 재정의했습니다.
sca.licenses.default_policy.body=이것은 귀하의 {defaultBadge} 라이선스 프로파일입니다. 다른 프로파일에 수동으로 할당되지 않은 모든 프로젝트는 이 프로파일을 사용합니다.
sca.licenses.default_policy.no_default=기본 라이선스 프로파일을 설정하지 않았습니다. 라이선스 프로파일이 기본으로 설정된 경우 다른 프로파일에 수동으로 할당되지 않는 한 모든 프로젝트가 분석 중 해당 프로파일을 사용합니다.
sca.licenses.default_policy.nothing_allowed=이 라이선스 프로파일이 기본으로 설정되어 있지만 허용된 라이선스나 라이선스 범주가 없습니다. 이 상태에서는 분석 시 개발자에게 모든 라이선스가 금지된 것으로 표시됩니다. 허용할 라이선스를 즉시 구성할 계획이 없다면 구성 후에 이 프로파일을 기본으로 설정하는 것을 권장합니다.
sca.licenses.policy.nothing_allowed=이 라이선스 프로파일에는 허용된 라이선스나 라이선스 범주가 없습니다. 이 상태에서는 분석 시 개발자에게 모든 라이선스가 금지된 것으로 표시됩니다. 허용할 라이선스를 즉시 구성할 계획이 없다면 구성 후에 이 프로파일을 기본으로 설정하는 것을 권장합니다.
