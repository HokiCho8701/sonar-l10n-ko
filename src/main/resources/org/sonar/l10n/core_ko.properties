settings.mode.instance_conditions_from_other_mode=이 인스턴스의 일부 품질 게이트가 {isStandardMode, select, true {Standard Experience} other {Multi-Quality Rule Mode}}에 속하는 메트릭을 사용하고 있습니다. 변경 사항을 저장하면 업데이트할 수 있습니다.
settings.mode.standard.name=표준 경험
settings.mode.mqr.name=다중 품질 규칙(MQR) 모드
settings.mode.standard.description.line1=버그, 코드 스멜, 취약점 등 규칙 유형의 전통적인 사용 방식을 제공하며, 각 규칙에 단일 유형과 심각도를 부여합니다.
settings.mode.standard.description.line2=이 방식은 규칙과 이슈의 심각도를 가장 큰 영향을 미치는 단일 소프트웨어 품질(예: 보안, 신뢰성, 유지보수성)을 기준으로 할당하는 데 중점을 둡니다. 이것은 {productName} 9.9 LTA 이전에 사용된 규칙 분류입니다.
settings.mode.mqr.description.line1=소프트웨어가 모든 소프트웨어 품질에 미치는 영향을 보다 정확하게 표현하는 것을 목표로 합니다. 단일 소프트웨어 품질에만 영향을 미치는 이슈는 거의 없습니다. 예를 들어, 대부분의 취약점은 버그이기도 하며, 반대의 경우도 마찬가지입니다. MQR 모드는 각 규칙을 영향을 미치는 각 품질에 매핑하고, 각 품질에 대해 별도의 심각도를 부여합니다.
settings.mode.mqr.description.line2=이 방식은 가장 심각한 영향뿐만 아니라 모든 소프트웨어 품질에 대한 이슈의 영향이 명확하게 드러나도록 하는 데 중점을 둡니다.
settings.mode.save.warning=변경 사항을 저장하여 인스턴스에 반영하세요
settings.mode.save=모드를 저장합니다. 현재 모드가 {isStandardMode, select, true {Standard Experience} other {Multi-Quality Rule Mode}}(으)로 전환됩니다.
settings.mode.save.success=이 인스턴스는 이제 {isStandardMode, select, true {Standard Experience} other {Multi-Quality Rule Mode}}(으)로 동작합니다.
mode.standard.advertisement=보안, 신뢰성, 유지보수성 이슈를 찾고 계신가요? 팀이 소프트웨어 품질로 작업하는 것을 선호한다면 <a>설정</a>에서 변경하세요.
mode.mqr.advertisement=버그, 취약점, 코드 스멜을 찾고 계신가요? 팀이 이러한 유형으로 작업하는 것을 선호한다면 <a>설정</a>에서 변경하세요.
settings.mode.mqr.advertisement=팀이 취약점, 버그, 코드 스멜로 작업하는 것을 선호한다면 일반 설정의 <a>모드 섹션</a>에서 변경하세요.
settings.mode.standard.advertisement=팀이 보안, 신뢰성, 유지보수성 이슈로 작업하는 것을 선호한다면 일반 설정의 <a>모드 섹션</a>에서 변경하세요.
settings.early_access.title=얼리 액세스 기능
settings.early_access.description=아래 나열된 기능은 Sonar의 재량으로 얼리 액세스 체험판으로 무료 제공됩니다. 체험은 언제든지 중단될 수 있습니다. 체험 기간 동안 사용해도 조직에 비용이 청구되지 않습니다. 이용 약관이 적용될 수 있습니다.
settings.early_access.misra.title=MISRA 준수
settings.early_access.misra.description.line1=이 기능을 활성화하면 추가 MISRA C++2023 규칙을 미리 볼 수 있습니다.
settings.early_access.misra.description.line2=체험 기간 종료 시 MISRA 준수 얼리 액세스 기능이 비활성화되고 모든 새로운 MISRA C++2023 규칙이 품질 프로파일에서 제거됩니다. 조직에 비용이 청구되지 않습니다.
settings.early_access.misra.checkbox_label=MISRA 준수 얼리 액세스 활성화
settings.early_access.misra.dialog_title=MISRA 준수 기능의 얼리 액세스 체험판을 {enable, select, true {활성화} other {비활성화}}하려고 합니다
settings.early_access.misra.dialog_description.enable=이 인스턴스에서 추가 MISRA C++2023 규칙의 미리 보기를 사용할 수 있습니다. <p>Sonar는 언제든지 체험을 중단할 수 있습니다. 중단되면 MISRA 준수 얼리 액세스 기능이 비활성화되고, 모든 새로운 MISRA C++2023 규칙이 품질 프로파일에서 제거되며, 관련 감지된 이슈가 모두 종료됩니다.</p> 조직에 비용이 청구되지 않습니다.
settings.early_access.misra.dialog_description.disable=모든 새로운 MISRA C++2023 규칙이 품질 프로파일에서 제거되고 관련 감지된 이슈가 모두 종료됩니다. 이 기능의 얼리 액세스가 제공되는 한 다시 활성화할 수 있습니다. <p>계속하시겠습니까?</p>
settings.early_access.misra.success=이 인스턴스의 MISRA 준수 얼리 액세스가 {enabled, select, true {활성화되었습니다} other {비활성화되었습니다}}
