mode_tour.name=표준 경험 및 MQR 모드 투어
mode_tour.link=문서에서 모드에 대해 자세히 알아보기
mode_tour.step1.title=SonarQube {isCommunityBuild, select, true {Community Build} other {Server}}에 오신 것을 환영합니다
mode_tour.step1.img_alt=두 가지 새 모드에서 이슈 차이점의 시각적 표현
mode_tour.step1.description=<p1>여러분과 팀이 익숙한 워크플로를 계속 사용하거나 새로운 개념을 탐색할 수 있도록 <b>표준 경험</b>과 <b>다중 품질 규칙(MQR) 모드</b>의 두 가지 모드를 도입했습니다.</p1><p>이 투어를 통해 두 모드의 차이점을 확인하세요.</p>
mode_tour.step2.title=표준 경험
mode_tour.step2.img_alt=표준 경험의 새로운 배지 시각적 표현: 취약점, 버그 및 코드 스멜
mode_tour.step2.description=<p1>표준 경험은 <b>취약점</b>, <b>버그</b>, <b>코드 스멜</b>과 같은 규칙 유형의 사용을 포함합니다. 각 규칙은 단일 유형과 심각도 수준을 가지며, 적절한 권한으로 사용자 정의할 수 있습니다.</p1><p>이 방식은 가장 큰 영향을 미치는 단일 소프트웨어 품질(예: 보안, 신뢰성, 유지보수성)을 기반으로 규칙에 심각도를 할당하는 데 중점을 둡니다.</p>
mode_tour.step3.title=다중 품질 규칙 모드
mode_tour.step3.img_alt=새로운 소프트웨어 품질 배지 시각적 표현: 보안, 신뢰성, 유지보수성 및 해당 표준 경험 배지와의 연결
mode_tour.step3.description=<p1>새로운 다중 품질 규칙 모드는 이슈가 모든 소프트웨어 품질에 미치는 영향을 더 정확하게 표현하는 것을 목표로 합니다.</p1><p>이를 위해 각 소프트웨어 품질(보안, 신뢰성, 유지보수성)에 대해 규칙에 별도의 심각도를 할당하여 기존 유형(취약점, 버그, 코드 스멜)을 대체합니다. 적절한 권한으로 심각도 수준을 사용자 정의할 수 있습니다.</p><p>이 방식은 가장 심각하게 영향받는 부분뿐만 아니라 모든 소프트웨어 품질에 대한 영향이 명확하게 드러나는 것에 중점을 둡니다.</p>
mode_tour.step4.title=모드 전환
mode_tour.step4.img_alt=관리 설정에서 표준 경험과 MQR 모드 전환의 시각적 표현
mode_tour.step4.description=<p1>현재 모드는 <b>{mode}</b>입니다.</p1><p>충분한 권한이 있으면 관리 > 구성 > 일반 설정 > 모드에서 변경할 수 있습니다.</p><p>인스턴스는 업그레이드 전 소프트웨어 버전과 가장 유사한 모드로 시작됩니다.</p>
mode_tour.step5.title=도움말 섹션에서 투어를 다시 볼 수 있습니다
