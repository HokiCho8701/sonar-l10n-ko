dependencies.risk.what.basicInfo.chanceOfFutureExploitation.epss.tooltip.epss_description=EPSS(Exploit Prediction Scoring System) v{version}는 향후 30일 내에 소프트웨어 취약점이 실제로 악용될 가능성을 0%에서 100% 범위로 추정하고, 그 가능성이 다른 평가된 취약점과 비교하여 어느 위치에 있는지 백분위 순위로 나타냅니다.
dependencies.risk.what.basicInfo.chanceOfFutureExploitation.epss.tooltip.risk_calculation_description=Sonar는 EPSS 점수와 다른 요소를 함께 사용하여 위험 심각도를 계산합니다. 중간 심각도 위험의 경우 EPSS가 0.5% 이상이고 CVSS가 4.0 이상이어야 하며, 높은 심각도 위험의 경우 EPSS가 5% 이상이고 CVSS가 7.0 이상이어야 합니다.
