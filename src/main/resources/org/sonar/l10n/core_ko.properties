dependencies.risk.how.title=의존성 업데이트
dependencies.risk.how.body=취약점을 수정한 의존성의 업데이트 버전이 있는 경우 해당 버전으로 업데이트하세요. 의존성 업데이트 후 애플리케이션을 철저히 테스트하여 아무 문제도 없는지 확인하세요.
dependencies.risk.how_introduced_link=이 의존성은 어떻게 도입되었나요?
dependencies.risk.how.find_alternative=대안 찾기
dependencies.risk.how.find_alternative.vulnerability_body=업데이트가 없는 경우, 동일한 기능을 제공하지만 취약점이 없는 대체 의존성으로 전환하는 것을 고려하세요.
dependencies.risk.how.find_alternative.license_body=이 의존성의 라이선스가 {profile} 라이선스 프로파일에 의해 금지되어 있으므로 요구 사항을 충족하는 다른 의존성을 찾아야 합니다.
dependencies.risk.how.license.view_allowed=이 프로젝트에서 허용된 라이선스 보기
