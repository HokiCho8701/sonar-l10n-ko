sca.licenses.category.permissive_standard=이 범주에는 가장 일반적으로 사용되는 퍼미시브 라이선스가 포함됩니다. 퍼미시브 라이선스는 매우 최소한의 의무(주로 저작자 표시)로 사용 및 수정에 대한 광범위한 권한을 부여합니다. 이 범주의 라이선스는 퍼미시브 오픈소스 라이선스의 모든 필수 요소를 갖추고 있습니다. 표준 퍼미시브 라이선스의 예로는 MIT 및 Apache 소프트웨어 라이선스가 있습니다.
sca.licenses.category.permissive_amateur=이 범주에는 현대 퍼미시브 오픈소스 라이선스의 하나 이상의 필수 요소가 없거나 복잡하거나 혼란스러운 요구 사항을 부과하는 퍼미시브 라이선스가 포함됩니다. 많은 경우 불명확하거나 익살스럽거나 불완전한 언어를 사용합니다. 이러한 라이선스는 법적 예측 가능성이 낮을 수 있습니다. 아마추어 퍼미시브 라이선스의 예로는 Artistic 1.0 및 WTFPL 소프트웨어 라이선스가 있습니다.
sca.licenses.category.copyleft_weak=약한 카피레프트 라이선스는 다른 사람에게 사본을 제공할 때 라이선스된 소프트웨어에 대한 변경 사항 및 추가 사항을 공유하도록 요구합니다. 약한 카피레프트 라이선스의 예로는 GNU LGPL 및 Mozilla Public License 소프트웨어 라이선스가 있습니다.
sca.licenses.category.copyleft_strong=약한 카피레프트 라이선스의 요구 사항 외에도 강한 카피레프트 라이선스는 다른 사람에게 사본을 제공할 때 라이선스된 소프트웨어로 구축한 더 큰 프로그램도 공유하도록 요구합니다. 강한 카피레프트 라이선스의 예로는 GNU GPL 라이선스가 있습니다.
sca.licenses.category.copyleft_network=강한 카피레프트 라이선스의 요구 사항 외에도 네트워크 카피레프트 라이선스는 다른 사람에게 사본을 제공할 때뿐만 아니라 인터넷이나 다른 네트워크를 통해 다른 사람이 사용할 수 있도록 소프트웨어를 실행할 때도 라이선스된 소프트웨어로 구축한 더 큰 프로그램을 공유하도록 요구합니다. 네트워크 카피레프트 라이선스의 예로는 GNU AGPL 및 Server-Side-Public License 소프트웨어 라이선스가 있습니다.
sca.licenses.category.copyleft_maximal=최대 카피레프트 라이선스는 다른 패밀리와 다르게 "라이선스가 언제 공유를 요구하는가?"라는 질문에 답합니다. 최대 카피레프트 라이선스는 만든 소프트웨어를 다른 사람과 공유하고 그렇게 할 때 동일하게 라이선스를 부여하도록 요구합니다. 최대 카피레프트 라이선스의 예로는 Parity 및 Reciprocal 소프트웨어 라이선스가 있습니다.
sca.licenses.category.uncategorized=미분류 라이선스는 Sonar에서 알 수 없습니다.
