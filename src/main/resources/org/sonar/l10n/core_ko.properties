dependencies.risk.how.wait_for_fix=수정 대기
dependencies.risk.how.wait_for_fix.body=이 의존성의 최신 버전을 사용하고 있으며 취약점을 해결할 더 새로운 버전이 없습니다. 의존성이 적극적으로 유지보수되고 있으며 곧 수정이 릴리스될 것으로 기대한다면 업데이트를 기다리는 것이 합리적일 수 있습니다.
dependencies.risk.how.fix_body.version_in_use.complete=현재 사용 중인 의존성 버전이지만 영향을 받지 않습니다.
dependencies.risk.how.fix_body.version_in_use.unknown=현재 사용 중인 의존성 버전이지만 데이터가 없습니다. 영향을 받을 수도 있고 받지 않을 수도 있습니다.
dependencies.risk.how.fix_body.version_in_use.default=현재 사용 중인 의존성의 영향을 받는 버전입니다.
dependencies.risk.how.fix_body.nearest_partial=이 취약점을 수정한 가장 가까운 버전이지만 {vulnerabilityIdCount}개의 다른 {vulnerabilityIdCount, plural, one {취약점} other {취약점}}이 있습니다.
dependencies.risk.how.fix_body.nearest_complete=알려진 취약점이 없는 가장 가까운 버전입니다.
dependencies.risk.how.fix_body.latest_partial=이 취약점을 수정한 최신 버전이지만 {vulnerabilityIdCount}개의 다른 {vulnerabilityIdCount, plural, one {취약점} other {취약점}}이 있습니다.
dependencies.risk.how.fix_body.latest_complete=알려진 취약점이 없는 최신 버전입니다.
dependencies.risk.how.fix_body.latest_stable.complete=알려진 취약점이 없는 최신 정식 릴리스 버전입니다.
dependencies.risk.how.fix_body.latest_stable.partial=이 취약점을 수정한 최신 정식 릴리스 버전이지만 {vulnerabilityIdCount}개의 다른 {vulnerabilityIdCount, plural, one {취약점} other {취약점}}이 있습니다.
dependencies.risk.how.fix_body.latest_stable.default=최신 정식 릴리스 버전이지만 이 취약점이 수정되지 않았습니다{vulnerabilityIdCount, plural, =1 {.} other { 다른 #개의 취약점이 있습니다.}}
dependencies.risk.how.fix_body.latest_prerelease.complete=알려진 취약점이 없는 최신 프리릴리스 버전입니다.
dependencies.risk.how.fix_body.latest_prerelease.partial=이 취약점을 수정한 최신 프리릴리스 버전이지만 {vulnerabilityIdCount}개의 다른 {vulnerabilityIdCount, plural, one {취약점} other {취약점}}이 있습니다.
