component_measures.overview.project_overview.description=운영 위험을 빠르게 파악할 수 있습니다. 키보드를 사용하는 사용자를 위해 요소는 각 파일의 코드 줄 수 기준으로 정렬됩니다. 녹색 이외의 색상은 즉각적인 위험을 나타냅니다: 검토가 필요한 버그 또는 취약점입니다. 그래프의 위쪽 또는 오른쪽에 위치하면 장기적인 건전성에 위험이 있을 수 있습니다. 왼쪽 하단의 녹색 버블이 가장 좋습니다.
component_measures.overview.Reliability.description=버그의 운영 위험을 확인합니다. 키보드를 사용하는 사용자를 위해 요소는 파일당 버그 수 기준으로 정렬됩니다. 버블 색상이 빨간색에 가까울수록 가장 심각한 버그의 심각도가 높습니다. 버블 크기는 버그 수를 나타내며 각 버블의 수직 위치는 버그를 해결하는 데 예상되는 시간을 나타냅니다. 아래쪽 가장자리의 작은 녹색 버블이 가장 좋습니다.
component_measures.overview.Security.description=취약점의 운영 위험을 확인합니다. 키보드를 사용하는 사용자를 위해 요소는 파일당 취약점 수 기준으로 정렬됩니다. 버블 색상이 빨간색에 가까울수록 가장 심각한 취약점이 존재합니다. 버블 크기는 취약점의 수를 나타내며 각 버블의 수직 위치는 취약점을 해결하는 데 필요한 예상 시간을 나타냅니다. 아래쪽 가장자리의 작은 녹색 버블이 가장 좋습니다.
component_measures.overview.Maintainability.description=코드 스멜의 장기적 위험을 확인합니다. 키보드를 사용하는 사용자를 위해 요소는 파일당 코드 스멜 수 기준으로 정렬됩니다. 버블 색상이 빨간색에 가까울수록 기술 부채 비율이 높습니다. 버블 크기는 코드 스멜 수를 나타내며 각 버블의 수직 위치는 코드 스멜을 해결하는 데 필요한 예상 시간을 나타냅니다. 아래쪽 가장자리의 작은 녹색 버블이 가장 좋습니다.
component_measures.overview.Coverage.description=누락된 테스트 커버리지의 장기적 위험을 확인합니다. 키보드를 사용하는 사용자를 위해 요소는 파일당 미커버 라인 수 기준으로 정렬됩니다. 버블 크기는 미커버 라인 수를 나타내며 각 버블의 수직 위치는 누락된 커버리지 양을 나타냅니다. 아래쪽 가장자리의 작은 버블이 가장 좋습니다.
component_measures.overview.Duplications.description=중복의 장기적 위험을 확인합니다. 키보드를 사용하는 사용자를 위해 요소는 파일당 중복 블록 수 기준으로 정렬됩니다. 버블 크기는 중복 블록의 수를 나타내며 각 버블의 수직 위치는 해당 블록의 라인 수를 나타냅니다. 아래쪽 가장자리의 작은 버블이 가장 좋습니다.
