settings.mode.title=모드
settings.mode.description.line1=이 인스턴스의 모든 프로젝트 상태를 반영하는 두 가지 옵션이 있습니다: {mqrLink}와 {standardLink}
settings.mode.description.line2=모드를 변경하면 분석 결과에 따른 이슈 분류 및 우선순위가 변경됩니다.
